<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exonie Online - Alpha Engine</title>

    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; font-family: 'MedievalSharp', cursive; background-color: #121212; color: #e0e0e0; display: flex; justify-content: center; align-items: center; height: 100vh; user-select: none; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; background-color: #1e1e1e; position: relative; overflow: hidden; image-rendering: pixelated; }
        .screen { width: 100%; height: 100%; display: none; } .screen.active { display: flex; }

        /* DEATH SCREEN */
        #death-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); color: red; z-index: 9000; flex-direction: column; justify-content: center; align-items: center; display: none; }
        #death-screen h1 { font-size: 80px; letter-spacing: 10px; margin-bottom: 30px; text-shadow: 0 0 20px red; }
        
        #loading-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #111; color: #fff; z-index: 5000; flex-direction: column; justify-content: center; align-items: center; }
        #map-transition { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; color: #f44336; z-index: 6000; flex-direction: column; justify-content: center; align-items: center; display: none; opacity: 0; transition: opacity 1s ease-in-out; }
        .transition-title { font-size: 50px; font-weight: bold; letter-spacing: 5px; text-transform: uppercase; animation: pulseText 2s infinite; }
        @keyframes pulseText { 0% { opacity: 0.5; text-shadow: 0 0 5px #f44336; } 50% { opacity: 1; text-shadow: 0 0 20px #ff9800; } 100% { opacity: 0.5; text-shadow: 0 0 5px #f44336; } }

        .loader-title { font-size: 32px; font-weight: bold; margin-bottom: 20px; color: #4CAF50; letter-spacing: 2px;}
        .loader-bar-bg { width: 400px; height: 12px; background: #333; border-radius: 6px; overflow: hidden; border: 2px solid #555;}
        .loader-bar-fill { width: 0%; height: 100%; background: #4CAF50; transition: width 0.8s ease-out; }

        input[type="text"], input[type="password"], input[type="number"], select, button, textarea { font-family: 'MedievalSharp', cursive; }
        input[type="text"], input[type="password"], input[type="number"] { background: #111; color: #0f0; border: 1px solid #4CAF50; padding: 10px; border-radius: 4px; font-size: 18px; width: calc(100% - 22px); outline: none; margin-bottom: 15px; box-sizing: border-box; }
        .btn { background-color: #3a3a3a; color: white; border: 1px solid #555; padding: 8px 12px; cursor: pointer; border-radius: 4px; transition: background 0.2s; font-size: 16px; }
        .btn:hover { background-color: #555; } .btn.selected { background-color: #4CAF50; border-color: #4CAF50; }
        .btn-large { background-color: #4CAF50; font-size: 20px; font-weight: bold; padding: 15px; margin-top: 20px; width: 100%; }

        .auth-container { position: relative; z-index: 10; width: 400px; padding: 30px; background: #1e1e1e; border-radius: 8px; border: 2px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.8); text-align: center; margin: auto; }
        .auth-container h1 { margin-top: 0; color: #4CAF50; font-size: 40px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .auth-link { color: #4CAF50; cursor: pointer; font-size: 16px; text-decoration: underline; margin-top: 15px; display: inline-block; }

        #creation-screen, #select-screen { flex-direction: row; }
        .stage-area { width: 45%; height: 100%; background: radial-gradient(circle, #444 0%, #222 100%); display: flex; justify-content: center; align-items: center; border-right: 2px solid #333; }
        .controls-area { width: 55%; height: 100%; padding: 40px; overflow-y: auto; box-sizing: border-box; }

        .avatar-rig { position: relative; display: flex; justify-content: center; filter: drop-shadow(1px 0px 0px #000) drop-shadow(-1px 0px 0px #000) drop-shadow(0px 1px 0px #000) drop-shadow(0px -1px 0px #000) drop-shadow(2px 2px 0px rgba(0,0,0,0.5)); }
        #preview-rig, #select-rig { width: 128px; height: 256px; transform: scale(1.5); transform-origin: center center; }
        .avatar-layer { position: absolute; left: 50%; transform: translateX(-50%); width: auto; max-width: none; object-fit: contain; image-rendering: pixelated; }

        .layer-hair { height: 65%; top: 27%; z-index: 2; } .layer-head { height: 65%; top: 27%; z-index: 3; }
        .layer-body { height: 120%; bottom: -45%; z-index: 4; } .layer-weapon { height: 120%; bottom: -45%; z-index: 7; }

        #game-screen { position: relative; width: 100%; height: 100%; background-color: #000; }
        #world { position: absolute; width: 2000px; height: 1333px; background-size: 100% 100%; transform-origin: top left; transition: background-image 0.5s; }

        .collision-box { position: absolute; background: transparent; z-index: 900; pointer-events: none; }
        #world.admin-active .collision-box { background: rgba(255, 0, 0, 0.4) !important; border: 1px solid red; }

        .entity { position: absolute; transition: filter 0.1s; z-index: 100;} #player-container { z-index: 105; transition: opacity 0.3s; }
        .name-tag { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); color: #fff; font-size: 14px; font-weight: bold; white-space: nowrap; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px -1px 0 #000, 1px 1px 0 #000; z-index: 20; pointer-events: none; }
        .mob-name { color: #f44336; top: -30px; font-size: 12px;}
        .player-avatar-container { pointer-events: none; transform-origin: center bottom; position: relative; width: 48px; height: 96px; }
        .player-avatar-container::after { content: ''; position: absolute; bottom: 0px; left: 50%; transform: translateX(-50%); width: 30px; height: 8px; background: rgba(0, 0, 0, 0.4); border-radius: 50%; z-index: -2; }

        .monster-container { transition: filter 0.1s, transform 0.15s ease-out; }
        .hit-flash .monster-sprite-layer { filter: brightness(2) drop-shadow(0 0 5px red) !important; }
        @keyframes slime-bounce { 0% { transform: translateY(0) scaleY(0.9); } 100% { transform: translateY(-12px) scaleY(1.1); } }

        #hud { position: absolute; top: 20px; left: 20px; width: 250px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 1px solid #555; z-index: 1000; }
        #combat-log { position: absolute; bottom: 20px; left: 20px; color: #fff; font-size: 18px; background: rgba(0,0,0,0.6); padding: 10px 15px; border-radius: 5px; z-index: 1000; pointer-events: none; }
        #party-panel { margin-top: 10px; padding-top: 10px; border-top: 1px solid #444; display: none; }
        
        #chat-input-container { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 3000; display: none; }
        #chat-input { background: rgba(0,0,0,0.8); border: 1px solid #4CAF50; color: white; padding: 10px 20px; width: 400px; border-radius: 25px; outline: none; font-size: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.8); }
        .chat-bubble { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(255, 255, 255, 0.9); color: #111; padding: 6px 14px; border-radius: 12px; font-size: 14px; font-weight: bold; white-space: nowrap; pointer-events: none; box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 200; animation: fadeInOut 4s forwards; }
        @keyframes fadeInOut { 0% { opacity: 0; transform: translate(-50%, 10px); } 10% { opacity: 1; transform: translate(-50%, 0); } 80% { opacity: 1; transform: translate(-50%, 0); } 100% { opacity: 0; transform: translate(-50%, -10px); } }

        .popup-dialog { position: absolute; top: 30%; left: 50%; transform: translateX(-50%); background: rgba(20,20,20,0.95); border-radius: 8px; padding: 25px; z-index: 4000; display: none; text-align: center; box-shadow: 0 0 20px #000; }
        /* Hidden UI specific classes omitted for character limit, menus retain base styles */
    </style>
</head>

<body>
<div id="game-container">

    <div id="chat-input-container"><input type="text" id="chat-input" placeholder="Press Enter to Chat..." autocomplete="off"></div>
    
    <div id="death-screen" class="screen">
        <h1>YOU DIED</h1>
        <button class="btn btn-large" style="width:250px; background:#f44336; font-size: 24px;" onclick="window.respawn()">Respawn in Town</button>
    </div>

    <div id="auth-screen" class="screen active" style="background: url('town_map.png') center/cover; position: relative;">
        <div style="position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); z-index: 1;"></div>
        <div class="auth-container" id="login-form">
            <h1>Exonie Online</h1>
            <input type="text" id="login-user" placeholder="Username" maxlength="16">
            <input type="password" id="login-pass" placeholder="Password">
            <button class="btn btn-large" onclick="window.attemptLogin()">LOGIN</button>
            <span class="auth-link" onclick="window.switchAuth('register')">Create an Account</span>
        </div>
        <div class="auth-container" id="register-form" style="display: none;">
            <h1>Join Exonie</h1>
            <input type="text" id="reg-user" placeholder="Username" maxlength="16">
            <input type="password" id="reg-pass" placeholder="Password">
            <button class="btn btn-large" onclick="window.attemptRegister()">CREATE ACCOUNT</button>
            <span class="auth-link" onclick="window.switchAuth('login')">Back to Login</span>
        </div>
    </div>

    <div id="loading-screen" class="screen">
        <div class="loader-title" id="loading-text">Loading...</div>
        <div class="loader-bar-bg"><div id="loader-fill" class="loader-bar-fill"></div></div>
    </div>

    <div id="map-transition" class="screen">
        <div class="transition-title" id="transition-text">Entering Floor 1...</div>
    </div>

    <div id="select-screen" class="screen">
        <div class="stage-area" style="width: 100%; background: url('town_map.png') center/cover; position: relative;">
            <div style="position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 1;"></div>
            <div style="text-align: center; position: relative; z-index: 10;">
                <h1 id="select-name-display" style="color: #4CAF50; font-size: 50px; margin-bottom: 5px; text-shadow: 0 4px 10px rgba(0,0,0,0.8);">Player</h1>
                <p id="select-level-display" style="color: #ffd700; margin-top:0; margin-bottom: 40px; font-size: 24px; font-weight: bold;">Level 1</p>
                <div id="select-rig" class="avatar-rig" style="margin: auto; margin-bottom: 60px; pointer-events: none;">
                    <img id="select-hair" class="avatar-layer layer-hair" src="animation/avatar_hair1.png" style="opacity:0">
                    <img id="select-head" class="avatar-layer layer-head" src="animation/avatar_head.png" style="opacity:0">
                    <img id="select-body" class="avatar-layer layer-body" src="animation/avatar_idlefront.png" style="opacity:0">
                    <img id="select-weapon" class="avatar-layer layer-weapon" style="display:none; opacity:0">
                </div>
                <button class="btn btn-large" onclick="window.enterGameWorld()" style="width: 300px; font-size: 28px; position: relative; z-index: 9999; pointer-events: auto; cursor: pointer;">ENTER WORLD</button>
            </div>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div id="hud">
            <div class="level-row"><span id="ui-name-display" style="color:#fff;">Player</span><span>Lv. <span id="ui-level-text">1</span></span></div>
            <div class="stat-row"><span>HP</span> <span id="ui-hp-text">100 / 100</span></div><div class="bar-container"><div id="ui-hp-bar" style="height:100%; background:#4CAF50;"></div></div>
            <div style="font-size: 14px; color: #aaa; margin-top: 8px; font-weight: bold;">[Enter] Chat | [B] Auto Attack</div>
            <div id="party-panel"><div id="party-title">Party</div><div id="party-members"></div></div>
        </div>

        <div id="combat-log">Welcome to Exonie. WASD to move. Left click to attack.</div>

        <div id="world">
            <div id="collision-layers"></div>
            <div id="player-container" class="entity" style="left: 960px; top: 1000px;">
                <div id="player-name-tag" class="name-tag">Player</div>
                <div id="player-avatar-container" class="player-avatar-container avatar-rig">
                    <img id="player-hair" class="avatar-layer layer-hair" src="animation/avatar_hair1.png" style="opacity:0">
                    <img id="player-head" class="avatar-layer layer-head" src="animation/avatar_head.png" style="opacity:0">
                    <img id="player-body" class="avatar-layer layer-body" src="animation/avatar_idlefront.png" style="opacity:0">
                    <img id="player-weapon" class="avatar-layer layer-weapon" style="display:none; opacity:0">
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ==========================================
// AUTO-LOGIN ENGINE (Skip to Character Screen)
// ==========================================
window.onload = () => {
    let savedU = localStorage.getItem('exonie_user');
    let savedP = localStorage.getItem('exonie_pass');
    if(savedU && savedP) {
        document.getElementById('login-user').value = savedU;
        document.getElementById('login-pass').value = savedP;
        window.attemptLogin(); // Instantly logs them in if they refresh!
    }
};

document.querySelectorAll('.avatar-layer').forEach(img => {
    img.onerror = function() {
        if (this.src.includes('_attack.png')) this.src = this.src.replace('_attack.png', '.png');
        else this.style.opacity = '0';
    };
    img.onload = function() { this.style.opacity = '1'; };
});

let socket;
try { socket = io(); } catch(e) { console.warn("Socket disconnected."); }

const dom = {
    game: document.getElementById('game-screen'), playerContainer: document.getElementById('player-container'), playerAvatarContainer: document.getElementById('player-avatar-container'), playerBody: document.getElementById('player-body'), playerHead: document.getElementById('player-head'), playerHair: document.getElementById('player-hair'), playerWeapon: document.getElementById('player-weapon'), world: document.getElementById('world'), log: document.getElementById('combat-log'), partyPanel: document.getElementById('party-panel'), partyMembers: document.getElementById('party-members')
};

window.charData = { skinColor: 'flesh', hairColor: 'black', hairStyle: '1' };
window.adminMode = false; const CAMERA_ZOOM = 1.8;
window.MapDatabase = window.MapDatabase || {};
let safeMapData = { id: "town", name: "Town of Exonie", image: "town_map.png", spawnX: 960, spawnY: 1000, collisions: [], teleports: [] };

let isAttacking = false; let attackHeld = false; let isChatting = false; 
let autoAttackMode = false; let lastSentState = 'idle'; let lastNetTs = 0;

window.game = {
    isRunning: false, isGhost: false, keys: { w: false, a: false, s: false, d: false },
    player: { id: 'local_player', name: "Adventurer", level: 1, currentHp: 100, x: 960, y: 1000, width: 48, height: 96, w: 24, h: 20, teleportCooldown: 0, currentPortal: null, equips: { weapon: null }, currentBodySrc: '' },
    monsters: {}, remotePlayers: {}, party: null
};

// ==========================================
// CACHE BUSTER MAP LOADER (DEEP COPY FIX)
// ==========================================
window.loadMapScript = function(mapId, callback) {
    let scriptName = (mapId === 'town' ? 'townmap.js' : mapId + '.js') + '?v=' + Date.now();
    let script = document.createElement('script');
    script.src = scriptName;
    script.onload = () => {
        let varName = mapId === 'town' ? 'townMapData' : mapId + 'MapData';
        if (typeof window[varName] !== 'undefined') {
            window.MapDatabase[mapId] = JSON.parse(JSON.stringify(window[varName])); 
        }
        callback();
    };
    script.onerror = () => { window.MapDatabase[mapId] = { id: mapId, name: mapId, image: mapId === 'town' ? 'town_map.png' : mapId + '.png', spawnX: 960, spawnY: 1000, collisions: [], teleports: [] }; callback(); };
    document.head.appendChild(script);
}

// THE PURE 0.5s PULSE ANIMATION ENGINE (NO MORE LAG!)
window.updateAnimationFrames = function(state) {
    dom.playerAvatarContainer.style.transform = window.facingRight ? 'scaleX(-1)' : 'scaleX(1)';
    let rawWpn = game.player.equips.weapon ? game.player.equips.weapon.sprite : null;
    let wpn = rawWpn ? rawWpn.replace('starter', 'basic') : null; 
    
    // Uses real clock time: Alternates true/false exactly every 0.5 seconds!
    let pulseActive = (Math.floor(Date.now() / 500) % 2 === 0);
    let bodySrc = 'animation/avatar_idlefront.png';
    let isAtk = false;

    if (state === 'attack' && pulseActive) { bodySrc = 'animation/avatar_attack.png'; isAtk = true; }
    else if (state === 'walk' && pulseActive) { bodySrc = 'animation/avatar_walk.png'; }

    if (game.player.currentBodySrc !== bodySrc) {
        dom.playerBody.src = bodySrc;
        game.player.currentBodySrc = bodySrc;
    }

    if (wpn) { 
        dom.playerWeapon.style.display = 'block'; 
        let wpnSrc = `weapon/${wpn}${(state === 'attack' && isAtk && !wpn.includes('pendant')) ? '_attack' : ''}.png`; 
        if (game.player.currentWeaponSrc !== wpnSrc) {
            dom.playerWeapon.src = wpnSrc;
            game.player.currentWeaponSrc = wpnSrc;
        }
    } else { dom.playerWeapon.style.display = 'none'; }
}

window.attemptLogin = function() {
    const u = document.getElementById('login-user').value.trim(); const p = document.getElementById('login-pass').value; if (!u || !p) return;
    localStorage.setItem('exonie_user', u); localStorage.setItem('exonie_pass', p);
    document.getElementById('auth-screen').classList.remove('active'); document.getElementById('loading-screen').style.display = 'flex'; 
    if(socket) socket.emit('login', { username: u, password: p });
};
window.attemptRegister = function() {
    const u = document.getElementById('reg-user').value.trim(); const p = document.getElementById('reg-pass').value; if (!u || !p) return;
    localStorage.setItem('exonie_user', u); localStorage.setItem('exonie_pass', p);
    document.getElementById('auth-screen').classList.remove('active'); document.getElementById('loading-screen').style.display = 'flex'; 
    if(socket) socket.emit('register', { username: u, password: p });
};

// GHOST WIPE SYSTEM -> RESPAWN CLICK
window.respawn = function() {
    document.getElementById('death-screen').style.display = 'none';
    game.isGhost = false; dom.playerContainer.style.opacity = '1';
    if(socket) socket.emit('respawnPlayer');
};

if(socket) {
    socket.on('characterSelect', (userData) => {
        document.getElementById('loading-screen').style.display = 'none'; document.getElementById('select-name-display').innerText = userData.character_name;
        document.getElementById('select-screen').classList.add('active'); game.cachedUserData = userData;
    });

    socket.on('authSuccess', (userData) => {
        game.player.id = userData.character_name; game.player.name = userData.character_name; game.player.currentHp = 100;
        let targetMapId = userData.map_id || 'town';
        window.loadMapScript(targetMapId, () => {
            safeMapData = window.MapDatabase[targetMapId]; game.player.x = safeMapData.spawnX; game.player.y = safeMapData.spawnY;
            document.getElementById('loading-screen').style.display = 'none'; dom.game.classList.add('active');
            dom.world.style.backgroundImage = `url('${safeMapData.image}')`;
            
            // IF NEW INSTANCE, FIRE SYNC MAP DATA SO MONSTERS SPAWN!
            socket.on('requestMapSync', (req) => {
                window.loadMapScript(req.mapId, () => {
                    let mapPayload = Object.assign({}, window.MapDatabase[req.mapId], { instanceId: req.instanceId });
                    socket.emit('syncMapData', mapPayload);
                });
            });

            game.isRunning = true; requestAnimationFrame(gameLoop);
        });
    });

    // REMOTE GHOST SUPPORT
    socket.on('remotePlayerGhosted', (pid) => { const rp = document.getElementById('remote_' + pid); if(rp) rp.style.opacity = '0.5'; });
    socket.on('partyWiped', () => { document.getElementById('death-screen').style.display = 'flex'; });

    // PORTAL GATHER & APPROVAL LOGIC
    socket.on('partyError', (msg) => { dom.log.innerText = msg; });
    socket.on('teleportApproved', (tp) => {
        let nextMapId = tp.targetMapId || 'town';
        const transScreen = document.getElementById('map-transition');
        document.getElementById('transition-text').innerText = `Entering ${nextMapId}...`;
        transScreen.style.display = 'flex'; setTimeout(() => { transScreen.style.opacity = '1'; }, 10);
        game.player.teleportCooldown = 4000;

        setTimeout(() => {
            window.loadMapScript(nextMapId, () => {
                safeMapData = window.MapDatabase[nextMapId];
                let targetId = tp.portalId % 2 === 1 ? tp.portalId + 1 : tp.portalId - 1; let targetPortal = safeMapData.teleports.find(p => p.portalId === targetId);
                game.player.x = targetPortal ? (targetPortal.x + (targetPortal.w / 2) - (game.player.width / 2)) : safeMapData.spawnX;
                game.player.y = targetPortal ? (targetPortal.y + targetPortal.h - game.player.height + 5) : safeMapData.spawnY;
                dom.world.style.backgroundImage = `url('${safeMapData.image}')`; 
                if(socket) socket.emit('playerTeleported', { mapId: nextMapId, x: game.player.x, y: game.player.y });
                transScreen.style.opacity = '0'; setTimeout(() => { transScreen.style.display = 'none'; }, 1000);
            });
        }, 1500);
    });
}

function gameLoop(ts) {
    if (!game.isRunning) return;

    if (game.player.currentHp <= 0 && !game.isGhost) {
        game.isGhost = true; dom.playerContainer.style.opacity = '0.5';
        if(socket) socket.emit('playerDied');
    }

    let nextX = game.player.x; let nextY = game.player.y; let isMoving = false; const moveSpeed = 5;

    if (!isChatting && !game.isGhost) {
        if (game.keys.w) { nextY -= moveSpeed; isMoving = true; }
        if (game.keys.s) { nextY += moveSpeed; isMoving = true; }
        if (game.keys.a) { nextX -= moveSpeed; isMoving = true; window.facingRight = false; }
        if (game.keys.d) { nextX += moveSpeed; isMoving = true; window.facingRight = true; }
    }

    if (isMoving) { game.player.x = nextX; game.player.y = nextY; }

    // PARTY PORTAL STEP LOGIC
    if (game.player.teleportCooldown > 0) game.player.teleportCooldown -= 16;
    if (game.player.teleportCooldown <= 0 && isMoving && !game.isGhost) {
        const hitX = game.player.x + 12; const hitY = game.player.y + 76; const tps = safeMapData.teleports || [];
        let onPortal = null;
        for (let box of tps) { if (hitX < box.x + box.w && hitX + 24 > box.x && hitY < box.y + box.h && hitY + 20 > box.y) onPortal = box; }
        
        if (onPortal) {
            if (game.player.currentPortal !== onPortal.portalId) {
                game.player.currentPortal = onPortal.portalId;
                if(socket) socket.emit('portalStep', { portalId: onPortal.portalId, targetMapId: onPortal.targetMapId });
            }
        } else {
            if (game.player.currentPortal !== null) {
                game.player.currentPortal = null;
                if(socket) socket.emit('portalLeave');
            }
        }
    }

    dom.playerContainer.style.left = game.player.x + 'px'; dom.playerContainer.style.top = game.player.y + 'px'; 
    const cameraX = Math.floor((window.innerWidth / 2) - (game.player.x * CAMERA_ZOOM) - (game.player.width * CAMERA_ZOOM / 2)); 
    const cameraY = Math.floor((window.innerHeight / 2) - (game.player.y * CAMERA_ZOOM) - (game.player.height * CAMERA_ZOOM / 2)); 
    dom.world.style.transform = `translate3d(${cameraX}px, ${cameraY}px, 0) scale(${CAMERA_ZOOM})`;

    if (!game.isGhost) {
        if (isAttacking) window.updateAnimationFrames('attack');
        else if (isMoving) window.updateAnimationFrames('walk');
        else window.updateAnimationFrames('idle');
    }

    requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
