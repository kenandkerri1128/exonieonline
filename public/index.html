<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exonie Online - Alpha Engine</title>

    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

    <style>
        /* --- GLOBAL STYLES --- */
        body { margin: 0; font-family: 'MedievalSharp', cursive; background-color: #121212; color: #e0e0e0; display: flex; justify-content: center; align-items: center; height: 100vh; user-select: none; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; background-color: #1e1e1e; position: relative; overflow: hidden; image-rendering: pixelated; }
        .screen { width: 100%; height: 100%; display: none; } 
        .screen.active { display: flex; }

        /* --- DEATH & TRANSITION SCREENS --- */
        #death-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); color: red; z-index: 9000; flex-direction: column; justify-content: center; align-items: center; display: none; }
        #death-screen h1 { font-size: 80px; letter-spacing: 10px; margin-bottom: 30px; text-shadow: 0 0 20px red; }
        
        #loading-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #111; color: #fff; z-index: 5000; flex-direction: column; justify-content: center; align-items: center; }
        #map-transition { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; color: #f44336; z-index: 6000; flex-direction: column; justify-content: center; align-items: center; display: none; opacity: 0; transition: opacity 1s ease-in-out; }
        .transition-title { font-size: 50px; font-weight: bold; letter-spacing: 5px; text-transform: uppercase; animation: pulseText 2s infinite; }
        @keyframes pulseText { 0% { opacity: 0.5; text-shadow: 0 0 5px #f44336; } 50% { opacity: 1; text-shadow: 0 0 20px #ff9800; } 100% { opacity: 0.5; text-shadow: 0 0 5px #f44336; } }

        .loader-title { font-size: 32px; font-weight: bold; margin-bottom: 20px; color: #4CAF50; letter-spacing: 2px;}
        .loader-bar-bg { width: 400px; height: 12px; background: #333; border-radius: 6px; overflow: hidden; border: 2px solid #555;}
        .loader-bar-fill { width: 0%; height: 100%; background: #4CAF50; transition: width 0.3s ease-out; }

        input[type="text"], input[type="password"], input[type="number"], select, button, textarea { font-family: 'MedievalSharp', cursive; }
        input[type="text"], input[type="password"], input[type="number"] { background: #111; color: #0f0; border: 1px solid #4CAF50; padding: 10px; border-radius: 4px; font-size: 18px; width: calc(100% - 22px); outline: none; margin-bottom: 15px; box-sizing: border-box; }
        input:read-only { color: #888; border-color: #555; background: #222; }
        select { background: #111; color: #fff; border: 1px solid #4CAF50; padding: 5px; border-radius: 4px; outline: none; font-size: 16px; }
        .btn { background-color: #3a3a3a; color: white; border: 1px solid #555; padding: 8px 12px; cursor: pointer; border-radius: 4px; transition: background 0.2s; font-size: 16px; }
        .btn:hover { background-color: #555; } 
        .btn.selected { background-color: #4CAF50; border-color: #4CAF50; }
        .btn-large { background-color: #4CAF50; font-size: 20px; font-weight: bold; padding: 15px; margin-top: 20px; width: 100%; }
        .btn-large:hover { background-color: #45a049; }
        
        .panel-section { background-color: #2a2a2a; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333; }
        .panel-section h4 { margin: 0 0 10px 0; color: #aaa; text-transform: uppercase; font-size: 14px;}
        .button-group, .color-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .color-swatch { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; } 
        .color-swatch:hover { transform: scale(1.1); } 
        .color-swatch.selected { border-color: white; }

        /* --- AUTH SCREENS --- */
        .auth-container { position: relative; z-index: 10; width: 400px; padding: 30px; background: #1e1e1e; border-radius: 8px; border: 2px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.8); text-align: center; margin: auto; }
        .auth-container h1 { margin-top: 0; color: #4CAF50; font-size: 40px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .auth-link { color: #4CAF50; cursor: pointer; font-size: 16px; text-decoration: underline; margin-top: 15px; display: inline-block; } 
        .auth-link:hover { color: #fff; }

        #creation-screen, #select-screen { flex-direction: row; }
        .stage-area { width: 45%; height: 100%; background: radial-gradient(circle, #444 0%, #222 100%); display: flex; justify-content: center; align-items: center; border-right: 2px solid #333; }
        .controls-area { width: 55%; height: 100%; padding: 40px; overflow-y: auto; box-sizing: border-box; }

        .avatar-rig { position: relative; display: flex; justify-content: center; filter: drop-shadow(1px 0px 0px #000) drop-shadow(-1px 0px 0px #000) drop-shadow(0px 1px 0px #000) drop-shadow(0px -1px 0px #000) drop-shadow(2px 2px 0px rgba(0,0,0,0.5)); }
        #preview-rig, #select-rig { width: 128px; height: 256px; transform: scale(1.5); transform-origin: center center; }
        .avatar-layer { position: absolute; left: 50%; transform: translateX(-50%); width: auto; max-width: none; object-fit: contain; image-rendering: pixelated; }

        .layer-hair { height: 65%; top: 27%; z-index: 2; } 
        .layer-head { height: 65%; top: 27%; z-index: 3; }
        .layer-body { height: 120%; bottom: -45%; z-index: 4; } 
        .layer-leggings { height: 120%; bottom: -45%; z-index: 5; }
        .layer-armor { height: 120%; bottom: -45%; z-index: 6; } 
        .layer-weapon { height: 120%; bottom: -45%; z-index: 7; }

        /* --- GAME WORLD --- */
        #game-screen { position: relative; width: 100%; height: 100%; background-color: #000; }
        #world { position: absolute; width: 2000px; height: 1333px; background-size: 100% 100%; transform-origin: top left; transition: background-image 0.5s; }

        .collision-box { position: absolute; background: transparent; z-index: 900; pointer-events: none; }
        #world.admin-active .collision-box { background: rgba(255, 0, 0, 0.4) !important; border: 1px solid red; pointer-events: auto; cursor: pointer; }
        .admin-spawn-marker { position: absolute; width: 48px; height: 48px; border: 3px solid cyan; border-radius: 50%; background: rgba(0, 255, 255, 0.3); z-index: 800; pointer-events: none; transform: translate(-50%, -100%); display: none; }
        #world.admin-active .admin-spawn-marker { display: flex !important; justify-content: center; align-items: center; font-weight: bold; color: white;}

        #admin-panel { position: absolute; top: 20px; left: 290px; width: 450px; background: rgba(10, 10, 40, 0.95); padding: 15px; border-radius: 8px; border: 2px solid #55f; z-index: 2000; display: none; color: #fff; box-shadow: 0 0 15px rgba(0,0,255,0.5); overflow-y: auto; max-height: 90vh; }
        #admin-output { width: 100%; height: 100px; margin-top: 10px; margin-bottom: 10px; background: #111; color: #0f0; border: 1px solid #444; resize: none; font-size: 12px; box-sizing: border-box; padding: 5px; white-space: pre; overflow-x: auto; }
        .admin-tool-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; } 
        .admin-tool-row input[type="number"] { margin-bottom: 0; width: 80px; padding: 5px; }

        .entity { position: absolute; transition: filter 0.1s; z-index: 100;} 
        #player-container { z-index: 105; transition: opacity 0.3s; }
        .name-tag { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); color: #fff; font-size: 14px; font-weight: bold; white-space: nowrap; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px -1px 0 #000, 1px 1px 0 #000; z-index: 20; pointer-events: none; }
        .mob-name { color: #f44336; top: -30px; font-size: 12px;}
        .player-avatar-container { pointer-events: none; transform-origin: center bottom; position: relative; width: 48px; height: 96px; }
        .player-avatar-container::after { content: ''; position: absolute; bottom: 0px; left: 50%; transform: translateX(-50%); width: 30px; height: 8px; background: rgba(0, 0, 0, 0.4); border-radius: 50%; z-index: -2; }

        /* --- MONSTERS CSS --- */
        .monster-container { transition: filter 0.1s, transform 0.15s ease-out; }
        .hit-flash .monster-sprite-layer { filter: brightness(2) drop-shadow(0 0 5px red) !important; }
        @keyframes slime-bounce { 0% { transform: translateY(0) scaleY(0.9); } 100% { transform: translateY(-12px) scaleY(1.1); } }

        /* --- HUD & PANELS --- */
        #hud { position: absolute; top: 20px; left: 20px; width: 280px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 1px solid #555; z-index: 1000; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 18px; font-weight: bold;}
        .level-row { font-size: 16px; color: #ffd700; margin-bottom: 10px; display: flex; justify-content: space-between;}
        .bar-container { width: 100%; height: 15px; background-color: #333; border-radius: 3px; overflow: hidden; border: 1px solid #000; margin-bottom: 10px;}
        .hp-fill { height: 100%; background-color: #4CAF50; width: 100%; transition: width 0.2s ease-out; }
        .exp-fill { height: 100%; background-color: #9c27b0; width: 0%; transition: width 0.3s ease-out; }
        #combat-log { position: absolute; bottom: 20px; left: 20px; color: #fff; font-size: 18px; background: rgba(0,0,0,0.6); padding: 10px 15px; border-radius: 5px; z-index: 1000; pointer-events: none; }

        #party-panel { margin-top: 15px; padding-top: 15px; border-top: 1px solid #444; display: none; }
        #party-title { font-size: 16px; font-weight: bold; color: #4CAF50; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;}
        .party-row { display: flex; flex-direction: column; font-size: 14px; margin-bottom: 8px; color: #fff; } 
        .party-name-row { display: flex; justify-content: space-between; margin-bottom: 2px;}
        .party-hp-bar-bg { width: 100%; height: 8px; background: #333; border: 1px solid #000; border-radius: 4px; overflow: hidden; }
        .party-hp-bar-fill { height: 100%; background: #4CAF50; transition: width 0.2s; }

        /* ✅ HOTBAR UI FOR SKILLS WITH COOLDOWN TEXT */
        #hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 1000; display: none; }
        .hotbar-slot { width: 50px; height: 50px; background: rgba(0,0,0,0.8); border: 2px solid #555; border-radius: 5px; display: flex; justify-content: center; align-items: center; font-weight: bold; position: relative; overflow: hidden; }
        .hotbar-key { position: absolute; top: 2px; left: 4px; font-size: 12px; color: #ffeb3b; z-index: 2; }
        .hotbar-name { position: absolute; bottom: 2px; width: 100%; text-align: center; font-size: 10px; color: white; z-index: 2; pointer-events: none; line-height: 1; }
        .cooldown-overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; background: rgba(255,0,0,0.6); transition: height 0.1s linear; z-index: 3; }
        .cooldown-text { position: absolute; z-index: 4; font-size: 20px; font-weight: bold; color: white; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; pointer-events: none; display: none; }

        /* SKILL SCREEN UI */
        #skill-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 550px; background: rgba(20,20,20,0.98); border: 2px solid #9c27b0; border-radius: 10px; padding: 20px; z-index: 1500; display: none; box-shadow: 0 0 30px #000; }
        .skill-class-card { background: #111; border: 1px solid #444; padding: 15px; margin-bottom: 15px; border-radius: 5px; cursor: pointer; transition: background 0.2s; }
        .skill-class-card:hover { border-color: #9c27b0; background: #222; }
        .skill-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding: 10px 0; color: #fff; }
        .skill-row:last-child { border-bottom: none; }
        .skill-desc { font-size: 13px; color: #aaa; margin-top: 4px; line-height: 1.4; }
        
        /* AURA & SKILL EFFECTS */
        .aura { position: absolute; width: 150px; height: 150px; bottom: -25px; left: 50%; transform: translateX(-50%); border-radius: 50%; opacity: 0; pointer-events: none; z-index: 5; }
        .aura-green { background: radial-gradient(circle, rgba(76,175,80,0.8) 0%, rgba(76,175,80,0) 70%); }
        .aura-blue { background: radial-gradient(circle, rgba(33,150,243,0.8) 0%, rgba(33,150,243,0) 70%); }
        .aura-red { background: radial-gradient(circle, rgba(244,67,54,0.8) 0%, rgba(244,67,54,0) 70%); }
        @keyframes aura-burst { 0% { transform: translateX(-50%) scale(0.2); opacity: 1; } 100% { transform: translateX(-50%) scale(2.5); opacity: 0; } }

        .icicle { position: absolute; width: 15px; height: 40px; background: linear-gradient(to bottom, #fff, #00ffff); box-shadow: 0 0 10px #fff; border-radius: 2px 2px 50% 50%; pointer-events: none; z-index: 250; }
        .pet-slime { position: absolute; width: 30px; height: 30px; background-color: #00ffff; border: 2px solid #00bfff; border-radius: 50% 50% 40% 40%; z-index: 90; transition: left 0.2s, top 0.2s; animation: slime-bounce 0.6s infinite alternate; pointer-events: none; margin-top: -15px; margin-left: -15px;}

        /* --- EFFECTS --- */
        .spark { position: absolute; width: 16px; height: 16px; background-color: #fff; border-radius: 50%; box-shadow: 0 0 8px #ffeb3b, 0 0 15px #ff9800; pointer-events: none; z-index: 300; animation: spark-pop 0.3s ease-out forwards; }
        @keyframes spark-pop { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; } 50% { background-color: #ffeb3b; } 100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; } }
        .white-splash { position: absolute; width: 30px; height: 30px; background-color: #fff; border-radius: 50%; box-shadow: 0 0 15px #fff, 0 0 25px #e0ffff; pointer-events: none; z-index: 300; transform: translate(-50%, -50%); animation: white-splash-pop 0.3s ease-out forwards; }
        @keyframes white-splash-pop { 0% { transform: translate(-50%, -50%) scale(0.2); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; } }
        .magic-orb { position: absolute; width: 12px; height: 12px; background-color: #e0ffff; border-radius: 50%; box-shadow: 0 0 8px #00ffff, 0 0 15px #00ffff, 0 0 20px #ffffff; pointer-events: none; z-index: 250; transform: translate(-50%, -50%); }
        .damage-text { position: absolute; color: white; font-weight: bold; font-size: 16px; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; pointer-events: none; animation: floatUp 1s forwards; z-index: 200; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-40px) scale(1.5); } }
        .level-up-text { position: absolute; color: #ffd700; font-weight: bold; font-size: 28px; text-shadow: 0 0 10px #ff9800; pointer-events: none; animation: floatUp 2s forwards; z-index: 500; }
        .rarity-godly { animation: godly-sparkle 1.5s infinite alternate; }
        @keyframes godly-sparkle { 0% { text-shadow: 0 0 2px #fff, 0 0 5px #e0ffff; } 100% { text-shadow: 0 0 8px #fff, 0 0 15px #00ffff, 0 0 20px #00ffff; } }

        /* --- MENUS & WINDOWS --- */
        #inventory-screen { position: absolute; top: 0; right: 0; width: 350px; height: 100%; background-color: rgba(25, 25, 25, 0.98); border-left: 2px solid #555; padding: 20px; z-index: 1000; display: none; box-sizing: border-box; box-shadow: -5px 0 20px rgba(0,0,0,0.8); overflow-y: auto; }
        #inventory-screen h2 { margin-top: 0; text-align: center; border-bottom: 1px solid #444; padding-bottom: 10px; font-size: 28px; }
        .inv-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .inv-slot { width: 100%; aspect-ratio: 1; background: #2a2a2a; border: 1px solid #444; border-radius: 4px; display: flex; justify-content: center; align-items: center; font-size: 13px; text-align: center; cursor: pointer; user-select: none; color: white; padding: 4px; box-sizing: border-box; font-weight: bold; position: relative; }
        .inv-slot:hover { border-color: #4CAF50; background: #333; }
        .inv-qty { position: absolute; bottom: 2px; right: 4px; font-size: 11px; color: #fff; text-shadow: 1px 1px 0 #000; }
        .tooltip { visibility: hidden; position: absolute; bottom: 105%; left: 50%; transform: translateX(-50%); background-color: #111; color: #fff; text-align: center; padding: 8px 10px; border-radius: 4px; border: 1px solid #777; width: max-content; z-index: 100; font-size: 14px; line-height: 1.4; pointer-events: none; }
        .inv-slot:hover .tooltip { visibility: visible; }
        
        .equip-container { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px;}
        .equip-box { flex: 1; background: #1e1e1e; border: 1px solid #444; border-radius: 4px; padding: 10px 5px; text-align: center; font-size: 14px; position: relative; cursor: pointer; transition: background 0.2s;}
        .equip-box:hover { background: #333; border-color: #f44336; } 
        .equip-box:hover .tooltip { visibility: visible; }
        
        #inv-context-menu { display: none; position: absolute; background: #222; border: 1px solid #777; border-radius: 4px; z-index: 3000; flex-direction: column; width: 120px; box-shadow: 0 4px 10px rgba(0,0,0,0.8); }
        .ctx-btn { background: none; border: none; color: white; padding: 10px; cursor: pointer; text-align: left; font-weight: bold; font-size: 16px; font-family: 'MedievalSharp', cursive; } 
        .ctx-btn:hover { background: #444; }

        #player-context-menu { display: none; position: absolute; background: #222; border: 1px solid #777; border-radius: 4px; z-index: 3500; flex-direction: column; width: 140px; box-shadow: 0 4px 10px rgba(0,0,0,0.8); }
        #player-context-menu .ctx-btn { width: 100%; }

        #stat-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 450px; background-color: rgba(30, 30, 30, 0.98); border: 2px solid #555; border-radius: 8px; padding: 20px; z-index: 1000; display: none; box-shadow: 0 0 20px black; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; font-size: 18px; margin-bottom: 20px;}
        .stat-grid div span { color: #4CAF50; float: right; font-weight: bold;}

        #inspect-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 520px; background-color: rgba(20, 20, 20, 0.98); border: 2px solid #777; border-radius: 10px; padding: 16px; z-index: 1200; display: none; box-shadow: 0 0 25px rgba(0,0,0,0.9); }
        #inspect-content { max-height: 60vh; overflow-y: auto; padding-right: 6px; }
        .inspect-equip { background: rgba(0,0,0,0.35); border: 1px solid #444; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
        .inspect-title { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
        .inspect-item-name { font-weight: bold; font-size: 16px; } .inspect-sub { color: #aaa; font-size: 13px; }
        .inspect-stat { font-size: 13px; color: #e0e0e0; margin-top: 6px; line-height: 1.3; } .inspect-stat b { color: #4CAF50; } .inspect-empty { color: #888; font-style: italic; }

        /* --- BUBBLE CHAT UI --- */
        #chat-input-container { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 3000; display: none; }
        #chat-input { background: rgba(0,0,0,0.8); border: 1px solid #4CAF50; color: white; padding: 10px 20px; width: 400px; border-radius: 25px; outline: none; font-size: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.8); }
        .chat-bubble { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(255, 255, 255, 0.9); color: #111; padding: 6px 14px; border-radius: 12px; font-size: 14px; font-weight: bold; white-space: nowrap; pointer-events: none; box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 200; animation: fadeInOut 4s forwards; }

        .popup-dialog { position: absolute; top: 30%; left: 50%; transform: translateX(-50%); background: rgba(20,20,20,0.95); border-radius: 8px; padding: 25px; z-index: 4000; display: none; text-align: center; box-shadow: 0 0 20px #000; }
        #invite-dialog { border: 2px solid #4CAF50; } #trade-dialog { border: 2px solid #2196F3; } 
        .popup-dialog button { margin: 0 10px; width: 100px; }

        #trade-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 550px; background: rgba(20,20,20,0.98); border: 2px solid #2196F3; z-index: 4500; padding: 20px; box-shadow: 0 0 30px black; display: none; border-radius: 8px; }
        .trade-side { flex: 1; background: #111; padding: 10px; border: 1px solid #444; border-radius: 5px; }
    </style>
</head>
