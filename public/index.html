<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exonie Online - Alpha Engine</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'MedievalSharp', cursive; background-color: #121212; color: #e0e0e0; display: flex; justify-content: center; align-items: center; height: 100vh; user-select: none; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; background-color: #1e1e1e; position: relative; overflow: hidden; image-rendering: pixelated; }
        .screen { width: 100%; height: 100%; display: none; } .screen.active { display: flex; }
        #death-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); color: red; z-index: 9000; flex-direction: column; justify-content: center; align-items: center; display: none; }
        #death-screen h1 { font-size: 80px; letter-spacing: 10px; margin-bottom: 30px; text-shadow: 0 0 20px red; }
        #loading-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #111; color: #fff; z-index: 5000; flex-direction: column; justify-content: center; align-items: center; }
        #map-transition { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; color: #f44336; z-index: 6000; flex-direction: column; justify-content: center; align-items: center; display: none; opacity: 0; transition: opacity 1s ease-in-out; }
        .transition-title { font-size: 50px; font-weight: bold; letter-spacing: 5px; text-transform: uppercase; animation: pulseText 2s infinite; }
        @keyframes pulseText { 0% { opacity: 0.5; text-shadow: 0 0 5px #f44336; } 50% { opacity: 1; text-shadow: 0 0 20px #ff9800; } 100% { opacity: 0.5; text-shadow: 0 0 5px #f44336; } }
        .loader-title { font-size: 32px; font-weight: bold; margin-bottom: 20px; color: #4CAF50; letter-spacing: 2px;}
        .loader-bar-bg { width: 400px; height: 12px; background: #333; border-radius: 6px; overflow: hidden; border: 2px solid #555;}
        .loader-bar-fill { width: 0%; height: 100%; background: #4CAF50; transition: width 0.8s ease-out; }
        input[type="text"], input[type="password"], input[type="number"], select, button, textarea { font-family: 'MedievalSharp', cursive; }
        input[type="text"], input[type="password"], input[type="number"] { background: #111; color: #0f0; border: 1px solid #4CAF50; padding: 10px; border-radius: 4px; font-size: 18px; width: calc(100% - 22px); outline: none; margin-bottom: 15px; box-sizing: border-box; }
        .btn { background-color: #3a3a3a; color: white; border: 1px solid #555; padding: 8px 12px; cursor: pointer; border-radius: 4px; transition: background 0.2s; font-size: 16px; }
        .btn:hover { background-color: #555; } .btn.selected { background-color: #4CAF50; border-color: #4CAF50; }
        .btn-large { background-color: #4CAF50; font-size: 20px; font-weight: bold; padding: 15px; margin-top: 20px; width: 100%; }
        .auth-container { position: relative; z-index: 10; width: 400px; padding: 30px; background: #1e1e1e; border-radius: 8px; border: 2px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.8); text-align: center; margin: auto; }
        .avatar-rig { position: relative; display: flex; justify-content: center; filter: drop-shadow(1px 0px 0px #000) drop-shadow(-1px 0px 0px #000) drop-shadow(0px 1px 0px #000) drop-shadow(0px -1px 0px #000); }
        .avatar-layer { position: absolute; left: 50%; transform: translateX(-50%); width: auto; max-width: none; object-fit: contain; image-rendering: pixelated; }
        .layer-hair { height: 65%; top: 27%; z-index: 2; } .layer-head { height: 65%; top: 27%; z-index: 3; } .layer-body { height: 120%; bottom: -45%; z-index: 4; } .layer-weapon { height: 120%; bottom: -45%; z-index: 7; }
        #world { position: absolute; width: 2000px; height: 1333px; background-size: 100% 100%; transform-origin: top left; transition: background-image 0.5s; }
        .collision-box { position: absolute; background: transparent; z-index: 900; pointer-events: none; }
        #world.admin-active .collision-box { background: rgba(255, 0, 0, 0.4) !important; border: 1px solid red; pointer-events: auto; }
        .entity { position: absolute; transition: filter 0.1s; z-index: 100;}
        .name-tag { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); color: #fff; font-size: 14px; font-weight: bold; white-space: nowrap; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; z-index: 20; }
        #hud { position: absolute; top: 20px; left: 20px; width: 250px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 1px solid #555; z-index: 1000; }
        #stat-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 450px; background-color: rgba(30, 30, 30, 0.98); border: 2px solid #555; border-radius: 8px; padding: 20px; z-index: 1000; display: none; }
        .chat-bubble { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(255, 255, 255, 0.9); color: #111; padding: 6px 14px; border-radius: 12px; font-size: 14px; font-weight: bold; white-space: nowrap; z-index: 200; animation: fadeInOut 4s forwards; }
        @keyframes fadeInOut { 0% { opacity: 0; transform: translate(-50%, 10px); } 10% { opacity: 1; transform: translate(-50%, 0); } 80% { opacity: 1; transform: translate(-50%, 0); } 100% { opacity: 0; transform: translate(-50%, -10px); } }
    </style>
</head>
<body>
<div id="game-container">
    <div id="chat-input-container" style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 3000; display: none;">
        <input type="text" id="chat-input" placeholder="Press Enter to Chat..." autocomplete="off">
    </div>
    <div id="death-screen" class="screen"><h1>YOU DIED</h1><button class="btn btn-large" style="width:250px; background:#f44336;" onclick="window.respawn()">Respawn in Town</button></div>
    <div id="map-transition" class="screen"><div class="transition-title" id="transition-text">Entering Dungeon...</div></div>
    <div id="loading-screen" class="screen"><div class="loader-title" id="loading-text">Loading...</div><div class="loader-bar-bg"><div id="loader-fill" class="loader-bar-fill"></div></div></div>

    <div id="auth-screen" class="screen active" style="background: url('town_map.png') center/cover;">
        <div style="position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); z-index: 1;"></div>
        <div class="auth-container" id="login-form">
            <h1 style="color:#4CAF50; font-size:40px;">Exonie Online</h1>
            <input type="text" id="login-user" placeholder="Username">
            <input type="password" id="login-pass" placeholder="Password">
            <button class="btn btn-large" onclick="window.attemptLogin()">LOGIN</button>
            <span class="auth-link" style="color:#4CAF50; cursor:pointer;" onclick="window.switchAuth('register')">Create Account</span>
        </div>
        <div class="auth-container" id="register-form" style="display: none;">
            <h1 style="color:#4CAF50; font-size:40px;">Join Exonie</h1>
            <input type="text" id="reg-user" placeholder="Username">
            <input type="password" id="reg-pass" placeholder="Password">
            <button class="btn btn-large" onclick="window.attemptRegister()">CREATE</button>
            <span class="auth-link" style="color:#4CAF50; cursor:pointer;" onclick="window.switchAuth('login')">Back</span>
        </div>
    </div>

    <div id="select-screen" class="screen">
        <div class="stage-area" style="width: 100%; background: url('town_map.png') center/cover; position: relative;">
            <div style="position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 1;"></div>
            <div style="text-align: center; position: relative; z-index: 10;">
                <h1 id="select-name-display" style="color: #4CAF50; font-size: 50px;">...</h1>
                <p id="select-level-display" style="color: #ffd700; font-size: 24px;">Level 1</p>
                <div id="select-rig" class="avatar-rig" style="margin: 40px auto;">
                    <img id="select-hair" class="avatar-layer layer-hair" src="animation/avatar_hair1.png">
                    <img id="select-head" class="avatar-layer layer-head" src="animation/avatar_head.png">
                    <img id="select-body" class="avatar-layer layer-body" src="animation/avatar_idlefront.png">
                    <img id="select-weapon" class="avatar-layer layer-weapon" style="display:none;">
                </div>
                <button class="btn btn-large" onclick="window.enterGameWorld()" style="width: 300px;">ENTER WORLD</button>
            </div>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div id="hud">
            <div style="display:flex; justify-content:space-between;"><span id="ui-name-display">Player</span><span>Lv. <span id="ui-level-text">1</span></span></div>
            <div style="height:12px; background:#333; margin:10px 0;"><div id="ui-hp-bar" style="height:100%; background:#4CAF50; width:100%;"></div></div>
            <div style="font-size:12px;">[P] Stats | [I] Inv | [Enter] Chat</div>
        </div>
        <div id="stat-screen">
            <h2 style="text-align:center; border-bottom:1px solid #444;">Stats</h2>
            <div id="stat-list" style="margin-bottom:20px;"></div>
            <button class="btn btn-large" onclick="window.toggleStats()">Close</button>
            <button class="btn btn-large" style="background:#f44336; margin-top:10px;" onclick="window.logout()">LOGOUT</button>
        </div>
        <div id="world"><div id="collision-layers"></div><div id="player-container" class="entity"><div id="player-name-tag" class="name-tag"></div><div id="player-avatar-container" class="player-avatar-container avatar-rig"><img id="player-hair" class="avatar-layer layer-hair" src="animation/avatar_hair1.png"><img id="player-head" class="avatar-layer layer-head" src="animation/avatar_head.png"><img id="player-body" class="avatar-layer layer-body" src="animation/avatar_idlefront.png"><img id="player-weapon" class="avatar-layer layer-weapon" style="display:none;"></div></div></div>
    </div>
</div>
<script>
// ==========================================
// 1. GLOBAL VARIABLES & UTILS
// ==========================================
let socket;
try { socket = io(); } catch(e) { console.warn("Socket disconnected."); }

const dom = {
    game: document.getElementById('game-screen'),
    playerContainer: document.getElementById('player-container'),
    playerAvatarContainer: document.getElementById('player-avatar-container'),
    playerBody: document.getElementById('player-body'),
    playerHead: document.getElementById('player-head'),
    playerHair: document.getElementById('player-hair'),
    playerWeapon: document.getElementById('player-weapon'),
    world: document.getElementById('world'),
    log: document.getElementById('combat-log'),
    statScreen: document.getElementById('stat-screen'),
    statList: document.getElementById('stat-list')
};

const skinFilters = { 'flesh': 'sepia(1) hue-rotate(-25deg) saturate(2.5) brightness(1.1)', 'yellow': 'sepia(1) hue-rotate(15deg) saturate(3) brightness(1.2)', 'green': 'sepia(1) hue-rotate(75deg) saturate(2) brightness(1)', 'blue': 'sepia(1) hue-rotate(180deg) saturate(2) brightness(1)', 'white': 'grayscale(1) brightness(1.8) contrast(0.9)' };
const hairFilters = { 'black': 'brightness(0.2)', 'blonde': 'sepia(1) hue-rotate(15deg) saturate(3) brightness(1.5)', 'brown': 'sepia(1) hue-rotate(330deg) saturate(2) brightness(0.6)', 'blue': 'sepia(1) hue-rotate(180deg) saturate(2) brightness(1)', 'white': 'grayscale(1) brightness(1.8) contrast(0.9)' };

window.charData = { skinColor: 'flesh', hairColor: 'black', hairStyle: '1' };
window.adminMode = false;
window.facingRight = false;
let currentBGM = null;
let currentTrackName = "";
let isChatting = false;
let isAttacking = false;
let attackCooldownActive = false;
let lastNetTs = 0;
let lastSentState = 'idle';

window.game = {
    isRunning: false,
    isGhost: false,
    keys: { w: false, a: false, s: false, d: false },
    player: { 
        id: 'local_player', name: "Adventurer", level: 1, currentHp: 100, x: 960, y: 1000, 
        width: 48, height: 96, w: 24, h: 20, teleportCooldown: 0, currentPortal: null, 
        equips: { weapon: null }, currentBodySrc: '', currentWeaponSrc: '' 
    },
    monsters: {},
    remotePlayers: {}
};

window.MapDatabase = window.MapDatabase || {};
let safeMapData = { id: "town", name: "Town of Exonie", image: "town_map.png", spawnX: 960, spawnY: 1000, collisions: [], teleports: [] };

// ==========================================
// 2. CORE UI & ANIMATION (0.25s PULSE)
// ==========================================
window.updateAnimationFrames = function(state) {
    dom.playerAvatarContainer.style.transform = window.facingRight ? 'scaleX(-1)' : 'scaleX(1)';
    
    // Snappy 0.25s Pulse (Quarter Second)
    let pulseActive = (Math.floor(Date.now() / 250) % 2 === 0);
    
    let bodySrc = 'animation/avatar_idlefront.png';
    let isAtk = false;

    if (state === 'attack' && pulseActive) { 
        bodySrc = 'animation/avatar_attack.png'; 
        isAtk = true; 
    } else if (state === 'walk' && pulseActive) { 
        bodySrc = 'animation/avatar_walk.png'; 
    }

    if (game.player.currentBodySrc !== bodySrc) {
        dom.playerBody.src = bodySrc;
        game.player.currentBodySrc = bodySrc;
    }

    let wpn = game.player.equips.weapon?.sprite?.replace('starter', 'basic');
    if (wpn) {
        dom.playerWeapon.style.display = 'block';
        let wpnSrc = `weapon/${wpn}${(state === 'attack' && isAtk && !wpn.includes('pendant')) ? '_attack' : ''}.png`;
        if (game.player.currentWeaponSrc !== wpnSrc) {
            dom.playerWeapon.src = wpnSrc;
            game.player.currentWeaponSrc = wpnSrc;
        }
    } else {
        dom.playerWeapon.style.display = 'none';
    }
};

window.toggleStats = function() {
    const screen = document.getElementById('stat-screen');
    if (screen.style.display === 'block') {
        screen.style.display = 'none';
    } else {
        const stats = game.player.baseStats || {};
        dom.statList.innerHTML = `
            <div>Level: ${game.player.level}</div>
            <div>Gold: ${game.player.gold || 0}</div>
            <div>STR: ${stats.str || 10}</div>
            <div>INT: ${stats.int || 10}</div>
            <div>DEF: ${stats.defense || 0}</div>
        `;
        screen.style.display = 'block';
    }
};

// ==========================================
// 3. AUTH & SUPABASE CONNECTION
// ==========================================
window.logout = function() {
    localStorage.removeItem('exonie_user');
    localStorage.removeItem('exonie_pass');
    location.reload();
};

window.attemptLogin = function() {
    const u = document.getElementById('login-user').value.trim();
    const p = document.getElementById('login-pass').value;
    if (!u || !p) return;
    localStorage.setItem('exonie_user', u);
    localStorage.setItem('exonie_pass', p);
    document.getElementById('auth-screen').classList.remove('active');
    document.getElementById('loading-screen').style.display = 'flex';
    if(socket) socket.emit('login', { username: u, password: p });
};

window.attemptRegister = function() {
    const u = document.getElementById('reg-user').value.trim();
    const p = document.getElementById('reg-pass').value;
    if (!u || !p) return;
    if(socket) socket.emit('register', { username: u, password: p });
};

window.switchAuth = function(mode) {
    document.getElementById('login-form').style.display = mode === 'login' ? 'block' : 'none';
    document.getElementById('register-form').style.display = mode === 'register' ? 'block' : 'none';
};

// ==========================================
// 4. MAP & COLLISION (FIXED D-KEY)
// ==========================================
window.loadMapScript = function(mapId, callback) {
    let scriptName = (mapId === 'town' ? 'townmap.js' : mapId + '.js') + '?v=' + Date.now();
    let script = document.createElement('script');
    script.src = scriptName;
    script.onload = () => {
        let varName = mapId === 'town' ? 'townMapData' : mapId + 'MapData';
        if (typeof window[varName] !== 'undefined') window.MapDatabase[mapId] = JSON.parse(JSON.stringify(window[varName]));
        callback();
    };
    script.onerror = () => {
        window.MapDatabase[mapId] = { id: mapId, name: mapId, image: mapId === 'town' ? 'town_map.png' : mapId + '.png', spawnX: 960, spawnY: 1000, collisions: [], teleports: [] };
        callback();
    };
    document.head.appendChild(script);
};

window.isColliding = function(targetX, targetY) {
    const hitW = game.player.w;
    const hitH = game.player.h;
    // Accurate AABB collision box center
    const hitX = targetX + (game.player.width - hitW) / 2;
    const hitY = targetY + game.player.height - hitH;
    
    const cols = safeMapData.collisions || [];
    for (let box of cols) {
        if (hitX < box.x + box.w && hitX + hitW > box.x && hitY < box.y + box.h && hitY + hitH > box.y) return true;
    }
    return false;
};

// ==========================================
// 5. SOCKET LISTENERS (BINDING DATA)
// ==========================================
if (socket) {
    // FIX: Updates the character select screen with your Supabase data!
    socket.on('characterSelect', (userData) => {
        game.cachedUserData = userData;
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('select-name-display').innerText = userData.character_name;
        document.getElementById('select-level-display').innerText = "Level " + (userData.level || 1);
        
        // Update Select Screen Avatar
        const selectBody = document.getElementById('select-body');
        const selectHead = document.getElementById('select-head');
        const selectHair = document.getElementById('select-hair');
        const selectWeapon = document.getElementById('select-weapon');

        const skin = userData.skin_color || 'flesh';
        const hairCol = userData.hair_color || 'black';
        const style = userData.hair_style || '1';

        selectBody.style.filter = skinFilters[skin];
        selectHead.style.filter = skinFilters[skin];
        if (style === 'none') {
            selectHair.style.display = 'none';
        } else {
            selectHair.style.display = 'block';
            selectHair.src = `animation/avatar_hair${style}.png`;
            selectHair.style.filter = hairFilters[hairCol];
        }

        const wep = userData.equips?.weapon?.sprite;
        if (wep) {
            selectWeapon.src = `weapon/${wep.replace('starter', 'basic')}.png`;
            selectWeapon.style.display = 'block';
        } else {
            selectWeapon.style.display = 'none';
        }

        document.getElementById('select-screen').classList.add('active');
    });

    socket.on('authError', (msg) => {
        alert(mode);
        location.reload();
    });
    socket.on('authSuccess', (userData) => {
        game.player.id = userData.character_name;
        game.player.name = userData.character_name;
        document.getElementById('player-name-tag').innerText = game.player.name;
        document.getElementById('ui-name-display').innerText = game.player.name;
        
        game.player.level = userData.level || 1;
        game.player.gold = userData.gold || 0;
        game.player.baseStats = userData.base_stats || { hp: 100, attack: 5, defense: 2, str: 10, int: 10 };
        game.player.inventory = userData.inventory || new Array(20).fill(null);
        game.player.equips = userData.equips || { weapon: null };
        
        const mapId = userData.map_id || 'town';
        window.loadMapScript(mapId, () => {
            safeMapData = window.MapDatabase[mapId];
            game.player.x = userData.pos_x ?? safeMapData.spawnX;
            game.player.y = userData.pos_y ?? safeMapData.spawnY;

            document.getElementById('loading-screen').style.display = 'none';
            dom.game.classList.add('active');
            dom.world.style.backgroundImage = `url('${safeMapData.image}')`;
            
            // Set Player Skin/Hair visually
            dom.playerBody.style.filter = skinFilters[userData.skin_color || 'flesh'];
            dom.playerHead.style.filter = skinFilters[userData.skin_color || 'flesh'];
            if (userData.hair_style === 'none') {
                dom.playerHair.style.display = 'none';
            } else {
                dom.playerHair.style.display = 'block';
                dom.playerHair.src = `animation/avatar_hair${userData.hair_style || '1'}.png`;
                dom.playerHair.style.filter = hairFilters[userData.hair_color || 'black'];
            }

            // Fix: Request map sync so monsters appear in floors
            socket.emit('syncMapData', { ...safeMapData, instanceId: userData.character_name });
            
            game.isRunning = true;
            requestAnimationFrame(gameLoop);
        });
    });

    socket.on('remotePlayerJoined', (p) => window.addRemotePlayer(p));
    socket.on('remotePlayerLeft', (id) => window.removeRemotePlayer(id));
    socket.on('remotePlayerMoved', (data) => {
        const p = game.remotePlayers[data.id];
        if (!p) return;
        p.x = data.x; p.y = data.y;
        p.dom.style.left = p.x + 'px';
        p.dom.style.top = p.y + 'px';
        // Handle remote animation pulse
        let pulse = (Math.floor(Date.now() / 250) % 2 === 0);
        p.body.src = (data.state !== 'idle' && pulse) ? `animation/avatar_${data.state}.png` : 'animation/avatar_idlefront.png';
    });

    socket.on('partyWiped', () => { document.getElementById('death-screen').style.display = 'flex'; });
}

// ==========================================
// 6. REMOTE PLAYER HELPERS (FIXED TOWN VISIBILITY)
// ==========================================
window.addRemotePlayer = function(p) {
    if (game.remotePlayers[p.id]) return;
    const container = document.createElement('div');
    container.className = 'entity';
    container.id = 'remote_' + p.id;
    container.innerHTML = `<div class="name-tag">${p.name}</div><div class="avatar-rig">
        <img class="avatar-layer layer-body" src="animation/avatar_idlefront.png">
        <img class="avatar-layer layer-head" src="animation/avatar_head.png">
    </div>`;
    dom.world.appendChild(container);
    p.dom = container;
    p.body = container.querySelector('.layer-body');
    game.remotePlayers[p.id] = p;
};

window.removeRemotePlayer = function(id) {
    if (game.remotePlayers[id]) {
        game.remotePlayers[id].dom.remove();
        delete game.remotePlayers[id];
    }
};

// ==========================================
// 7. INPUT & MAIN LOOP (FIXED D-KEY & PULSE)
// ==========================================
window.addEventListener('keydown', (e) => {
    if (document.activeElement.tagName === 'INPUT') return;
    const k = e.key.toLowerCase();
    if (k === 'w') game.keys.w = true;
    if (k === 'a') { game.keys.a = true; window.facingRight = false; }
    if (k === 's') game.keys.s = true;
    if (k === 'd') { game.keys.d = true; window.facingRight = true; }
    if (k === 'p') window.toggleStats();
});

window.addEventListener('keyup', (e) => {
    const k = e.key.toLowerCase();
    if (k === 'w') game.keys.w = false;
    if (k === 'a') game.keys.a = false;
    if (k === 's') game.keys.s = false;
    if (k === 'd') game.keys.d = false;
});

function gameLoop() {
    if (!game.isRunning) return;

    let nextX = game.player.x;
    let nextY = game.player.y;
    let isMoving = false;
    const speed = 5;

    if (game.keys.w) { nextY -= speed; isMoving = true; }
    if (game.keys.s) { nextY += speed; isMoving = true; }
    if (game.keys.a) { nextX -= speed; isMoving = true; }
    if (game.keys.d) { nextX += speed; isMoving = true; }

    // FIXED COLLISION CHECK (Separated X and Y for sliding)
    if (isMoving && !game.isGhost) {
        if (!window.isColliding(nextX, game.player.y)) game.player.x = nextX;
        if (!window.isColliding(game.player.x, nextY)) game.player.y = nextY;
    }

    // Update Visuals
    dom.playerContainer.style.left = game.player.x + 'px';
    dom.playerContainer.style.top = game.player.y + 'px';
    
    // Camera
    const camX = (window.innerWidth / 2) - (game.player.x * CAMERA_ZOOM);
    const camY = (window.innerHeight / 2) - (game.player.y * CAMERA_ZOOM);
    dom.world.style.transform = `translate(${camX}px, ${camY}px) scale(${CAMERA_ZOOM})`;

    const state = isAttacking ? 'attack' : (isMoving ? 'walk' : 'idle');
    window.updateAnimationFrames(state);

    // Network Sync
    if (Date.now() - lastNetTs > 50) {
        socket.emit('playerMoved', { x: game.player.x, y: game.player.y, state, facingRight: window.facingRight });
        lastNetTs = Date.now();
    }

    requestAnimationFrame(gameLoop);
}

window.enterGameWorld = function() {
    document.getElementById('select-screen').classList.remove('active');
    document.getElementById('loading-screen').style.display = 'flex';
    socket.emit('enterWorld', game.cachedUserData);
};
</script>
</body>
</html>
